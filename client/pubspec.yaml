name: client
description: "SmartClass — Academic Management System"

publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.8.0+1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.6.3

  # Local storage
  shared_preferences: ^2.3.5

  # Form validation
  reactive_forms: ^17.0.0

  # File picker
  file_picker: ^10.1.9

  # Toast notifications
  fluttertoast: ^8.2.12

  # Loading indicators
  flutter_spinkit: ^5.2.1

  # Cached network image
  cached_network_image: ^3.4.1

  # URL launcher
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

  # V2 new packages
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  package_info_plus: ^8.3.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1F4E79"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app_icon.png
  android: true
  ios: false